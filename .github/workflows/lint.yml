name: Lint Plugins

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run skillsaw
        uses: stbenjam/skillsaw@b7cb23b15447c510c73b38f6516e356d2a8a95e1 #v0.16.0
        with:
          strict: true

  markdown-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run markdownlint
        run: npx markdownlint-cli2 "**/*.md"
