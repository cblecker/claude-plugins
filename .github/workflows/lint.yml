name: Lint Plugins

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run skillsaw
        uses: stbenjam/skillsaw@f9819d2de4d69100f8544175d4045f34f0282b66 #v0.17.0
        with:
          strict: true

  markdown-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run markdownlint
        run: npx markdownlint-cli2 "**/*.md"
